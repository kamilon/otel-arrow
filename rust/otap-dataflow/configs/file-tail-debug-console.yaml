version: otel_dataflow/v1
engine:
  telemetry:
    logs:
      level: info
      providers:
        engine: console_async
        global: console_async
        admin: console_direct
        internal: console_direct
groups:
  default:
    pipelines:
      main:
        policies:
          channel_capacity:
            control:
              node: 100
              pipeline: 100
            pdata: 128

        nodes:
          file_tail:
            type: receiver:file_tail
            config:
              # Glob patterns for files to monitor.
              paths:
                - /tmp/otap-test-logs/*.log
              # Initial per-file read buffer (default 32K).
              buffer_size: 32768
              # Maximum buffer growth per file (default 1M).
              max_buffer_size: 1048576
              # Maximum concurrently open file handles (default 256).
              max_open_files: 256
              # Record delimiter: newline | csv | tsv | json | custom.
              delimiter: newline
              # Where to start reading newly discovered files: beginning | end.
              start_position: beginning
              # Source file encoding (optional, default assumes UTF-8).
              # source_encoding: latin1
              # Target encoding for emitted records (optional, default UTF-8).
              # target_encoding: utf-8
              bookmark:
                enabled: true
                flush_interval_ms: 1000
              rotation:
                enabled: true
                check_interval_ms: 1000
              batch:
                max_size: 100
                max_duration_ms: 100
          debug:
            type: processor:debug
            config:
              verbosity: detailed
              mode: signal
          console:
            type: exporter:console
            config: {}

        connections:
          - from: file_tail
            to: debug
          - from: debug
            to: console
